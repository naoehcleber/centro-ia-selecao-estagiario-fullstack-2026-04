networks:
  app-networks:
    driver: bridge
services:
  back-end:
    build:
      context: ./Back-end
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-networks
  front-end:
    build:
      context: ./Front-end
      dockerfile: Dockerfile.dev
    develop:
      watch:
        - action: sync
          path: ./Front-end/app
          target: /app/
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./Front-end/app/package.json
    ports:
      - "5173:5173"
    networks:
      - app-networks
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - back-end
      - front-end
    networks:
      - app-networks